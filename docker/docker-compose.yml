services:
  postgres:
    image: postgres:16-alpine
    container_name: subgate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: subgate
      POSTGRES_PASSWORD: subgate_dev
      POSTGRES_DB: subgate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: subgate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
